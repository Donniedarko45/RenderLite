name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ec2-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verification
        run: npm run verify

      - name: Configure SSH
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on EC2
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_REF: ${{ github.sha }}
          DEPLOY_REPO_URL: git@github.com:${{ github.repository }}.git
        run: |
          ssh -o StrictHostKeyChecking=yes "${EC2_USER}@${EC2_HOST}" \
            "APP_DIR='${EC2_APP_DIR}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' DEPLOY_REF='${DEPLOY_REF}' DEPLOY_REPO_URL='${DEPLOY_REPO_URL}' bash -s" \
            < deploy/ec2/deploy.sh
